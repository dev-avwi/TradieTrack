name: Mobile Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-typecheck.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-typecheck.yml'

jobs:
  typecheck:
    name: tsc --noEmit (baseline-gated)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Run typecheck against baseline
        run: bash scripts/typecheck.sh
